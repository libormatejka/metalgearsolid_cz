<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:  #c9a84c;
      --green: #4caf82;
      --bg:    #0d0d0d;
      --card:  #141414;
      --line:  #222;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: #e8e8e8;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP NAV ── */
    .nav {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.65rem 1.25rem;
      background: #111;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      z-index: 10;
    }

    .nav .nav-left { display: flex; align-items: center; gap: 0.25rem; margin-right: auto; }

    .nav a {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.35rem 0.8rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #888;
      transition: color 0.2s, background 0.2s;
    }

    .nav a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nav a.back  { color: var(--gold); }
    .nav svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-bot {
      padding: 1.5rem 1.25rem 1.25rem;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    .bot-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #0d0d0d;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 0.75rem;
      box-shadow: 0 0 20px rgba(201,168,76,0.2);
    }

    .bot-name {
      font-size: 1rem;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: 0.04em;
    }

    .bot-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: #555;
      margin-top: 0.3rem;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .bot-desc {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: #555;
      line-height: 1.55;
    }

    /* Suggested questions */
    .sidebar-section {
      padding: 1rem 1.25rem 0.5rem;
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 0.6rem;
    }

    .suggestion {
      display: block;
      width: 100%;
      text-align: left;
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 6px;
      padding: 0.55rem 0.75rem;
      font-size: 0.78rem;
      color: #aaa;
      cursor: pointer;
      margin-bottom: 0.45rem;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .suggestion:hover {
      border-color: var(--gold);
      color: #e8e8e8;
      background: #1e1e1e;
    }

    .sidebar-divider {
      margin: 0.75rem 1.25rem;
      border: none;
      border-top: 1px solid var(--line);
    }

    /* History */
    .sidebar-history {
      flex: 1;
      overflow-y: auto;
      padding: 0 1.25rem 1rem;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      font-size: 0.78rem;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item:hover { background: #1a1a1a; color: #aaa; }
    .history-item.active { background: #1e1e1e; color: #ccc; }

    .history-item svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; opacity: 0.5; }

    /* ── CHAT MAIN ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .chat-topbar {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .chat-topbar-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #0d0d0d;
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .chat-topbar-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: #e8e8e8;
    }

    .chat-topbar-sub {
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.1rem;
    }

    .chat-topbar-actions {
      margin-left: auto;
      display: flex;
      gap: 0.25rem;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      transition: background 0.15s, color 0.15s;
    }

    .icon-btn:hover { background: #1a1a1a; color: #aaa; }
    .icon-btn svg { width: 17px; height: 17px; fill: currentColor; }

    /* Messages */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .msg {
      display: flex;
      gap: 0.75rem;
      max-width: 680px;
    }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
    }

    .msg-content { display: flex; flex-direction: column; gap: 0.25rem; }

    .msg-sender {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #444;
    }

    .msg.bot  .msg-sender { padding-left: 0.1rem; }
    .msg.user .msg-sender { padding-right: 0.1rem; text-align: right; }

    .msg-bubble {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .msg.bot  .msg-bubble {
      background: #181818;
      border: 1px solid #242424;
      color: #ddd;
      border-top-left-radius: 3px;
    }

    .msg.user .msg-bubble {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.22);
      color: #e8d9a8;
      border-top-right-radius: 3px;
    }

    .msg-bubble strong { color: var(--gold); font-weight: 600; }

    .msg-time {
      font-size: 0.65rem;
      color: #383838;
    }

    .msg.user .msg-time { text-align: right; }

    /* Typing */
    .typing-wrap {
      display: flex;
      gap: 0.75rem;
      align-self: flex-start;
    }

    .typing-bubble {
      background: #181818;
      border: 1px solid #242424;
      border-radius: 12px;
      border-top-left-radius: 3px;
      padding: 0.75rem 1rem;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-bubble span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      animation: blink 1.3s ease-in-out infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
      40%            { opacity: 1;    transform: scale(1.1);  }
    }

    /* ── INPUT AREA ── */
    .chat-input-area {
      padding: 1rem 1.5rem 1.25rem;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 0.6rem 0.6rem 0.6rem 1rem;
      transition: border-color 0.2s;
    }

    .input-box:focus-within { border-color: #3a3a3a; }

    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 0.85rem;
      color: #e8e8e8;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
      padding: 2px 0;
    }

    .chat-input::placeholder { color: #3a3a3a; }

    .input-actions {
      display: flex;
      gap: 0.25rem;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-send {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--gold);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s;
      flex-shrink: 0;
    }

    .chat-send:hover { background: #d4b55e; transform: scale(1.05); }
    .chat-send svg { width: 16px; height: 16px; fill: #0d0d0d; }

    .input-hint {
      text-align: center;
      font-size: 0.68rem;
      color: #2e2e2e;
      margin-top: 0.6rem;
    }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      .sidebar { display: none; }
    }
  </style>
</head>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-bot">
        <div class="bot-avatar">🐍</div>
        <div class="bot-name">Snake AI</div>
        <div class="bot-status">
          <span class="status-dot"></span>
          Online
        </div>
        <p class="bot-desc">Specialista na Metal Gear universum. Ptej se na hry, postavy, chronologii nebo merchandise.</p>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Navrhované otázky</div>
        <button class="suggestion">Jaké je chronologické pořadí her?</button>
        <button class="suggestion">Kdo je Big Boss?</button>
        <button class="suggestion">Co je to Patriots / Patrioti?</button>
        <button class="suggestion">Kde seženu MGS merchandise v ČR?</button>
        <button class="suggestion">Jaký je rozdíl mezi Solid Snake a Naked Snake?</button>
      </div>

      <hr class="sidebar-divider">

      <div class="sidebar-section">
        <div class="sidebar-label">Předchozí konverzace</div>
      </div>
      <div class="sidebar-history" id="historyList"></div>
    </aside>

    <!-- MAIN CHAT -->
    <div class="chat-main">
      <div class="chat-topbar">
        <div class="chat-topbar-avatar">🐍</div>
        <div>
          <div class="chat-topbar-name">Snake AI</div>
          <div class="chat-topbar-sub">Odpovídá na otázky o Metal Gear univerzu</div>
        </div>
        <div class="chat-topbar-actions">
          <button class="icon-btn" id="btnNewChat" title="Nová konverzace">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          </button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <div class="input-box">
          <textarea class="chat-input" id="chatInput" placeholder="Napiš otázku o Metal Gear univerzu…" rows="1"></textarea>
          <div class="input-actions">
            <button class="chat-send" id="chatSend">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
        <div class="input-hint">Snake AI může dělat chyby. Důležité informace si ověř.</div>
      </div>
    </div>

  </div>

  <script src="js/snake-ai.js"></script>
  <script>
    document.querySelector('.bot-name').textContent        = SnakeAI.CONFIG.botName;
    document.querySelector('.chat-topbar-name').textContent = SnakeAI.CONFIG.botName;

    SnakeAI.init({
      messagesEl: document.getElementById('chatMessages'),
      inputEl:    document.getElementById('chatInput'),
      sendEl:     document.getElementById('chatSend'),
      newChatEl:  document.getElementById('btnNewChat'),
      historyEl:  document.getElementById('historyList'),
    });
  </script>
