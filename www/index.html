  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.25rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #ccc;
      transition: color 0.2s, background 0.2s;
    }

    .nav a:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .nav svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 62vh;
      min-height: 400px;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* tmavý overlay přes video — zlehka ztmaví aby text byl čitelný */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    /* plynulý přechod do černé dole */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to bottom, transparent, #0d0d0d);
      z-index: 2;
    }

    .hero-content {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .hero-content h1 {
      font-size: clamp(1.8rem, 5vw, 3.6rem);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      letter-spacing: 0.02em;
      line-height: 1.15;
      max-width: 800px;
    }

    .hero-content h2 {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 400;
      color: #c9a84c;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── PRODUCTS ── */
    .products {
      background: #0d0d0d;
      padding: 1rem 1.5rem 5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #c9a84c;
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.15);
    }

    .card-img {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 220px;
      padding: 1rem;
    }

    .card-img img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }


    .card-body {
      padding: 1rem 1.2rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4caf82;
      font-weight: 600;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e8e8e8;
      line-height: 1.4;
      flex: 1;
    }

    .card-btn {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.45rem 1rem;
      background: transparent;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      color: #c9a84c;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-align: center;
      transition: background 0.2s, color 0.2s;
    }

    .card:hover .card-btn {
      background: #c9a84c;
      color: #0d0d0d;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── CHATBOT ── */
    .chat-toggle {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      z-index: 200;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1.5px solid #c9a84c;
      box-shadow: 0 0 0 0 rgba(201,168,76,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.2s, transform 0.2s;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(201,168,76,0.35); }
      50%       { box-shadow: 0 0 0 10px rgba(201,168,76,0);   }
    }

    .chat-toggle:hover {
      transform: scale(1.08);
      animation: none;
      box-shadow: 0 0 18px rgba(201,168,76,0.35);
    }

    .chat-toggle svg { width: 24px; height: 24px; fill: #c9a84c; transition: opacity 0.15s; }
    .chat-toggle .icon-close { display: none; }

    .chat-widget.open ~ .chat-toggle .icon-chat  { display: none; }
    .chat-widget.open ~ .chat-toggle .icon-close { display: block; }

    .chat-widget {
      position: fixed;
      bottom: 5.5rem;
      right: 1.75rem;
      z-index: 199;
      width: 360px;
      max-height: 520px;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      opacity: 0;
      transform: translateY(16px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .chat-widget.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.1rem;
      background: #1a1a1a;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #0d0d0d;
      border: 1.5px solid #c9a84c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .chat-header-info { flex: 1; min-width: 0; }

    .chat-header-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: 0.03em;
    }

    .chat-header-status {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: #666;
      margin-top: 0.1rem;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf82;
      box-shadow: 0 0 6px #4caf82;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }

    .msg {
      display: flex;
      gap: 0.6rem;
      max-width: 88%;
    }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-bubble {
      padding: 0.6rem 0.85rem;
      border-radius: 14px;
      font-size: 0.83rem;
      line-height: 1.5;
    }

    .msg.bot  .msg-bubble {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #ddd;
      border-bottom-left-radius: 4px;
    }

    .msg.user .msg-bubble {
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.25);
      color: #e8d9a8;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 0.65rem;
      color: #444;
      margin-top: 0.25rem;
      padding: 0 0.2rem;
    }

    .msg.bot  .msg-time { text-align: left;  }
    .msg.user .msg-time { text-align: right; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 0.5rem 0.85rem;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      animation: blink 1.2s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
      40%            { opacity: 1;   transform: scale(1.15); }
    }

    .chat-input-area {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 0.5rem 1rem;
      font-size: 0.82rem;
      color: #e8e8e8;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input::placeholder { color: #444; }
    .chat-input:focus { border-color: #3a3a3a; }

    .chat-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #c9a84c;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .chat-send:hover { background: #d4b55e; transform: scale(1.08); }
    .chat-send svg { width: 16px; height: 16px; fill: #0d0d0d; }

    /* markdown uvnitř chat bublin */
    .msg-bubble ul, .msg-bubble ol {
      margin: 0.4rem 0 0.2rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .msg-bubble li { line-height: 1.5; }
    .msg-bubble strong { color: #f0d078; font-weight: 700; }
    .msg-bubble em { color: #bbb; font-style: italic; }
    .msg-bubble p { margin: 0.3rem 0; }
    .msg-bubble p:first-child { margin-top: 0; }
    .msg-bubble p:last-child  { margin-bottom: 0; }
    .msg-bubble code {
      background: #0d0d0d;
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-family: monospace;
      font-size: 0.85em;
    }

    @media (max-width: 420px) {
      .chat-widget { width: calc(100vw - 2rem); right: 1rem; }
      .chat-toggle { right: 1rem; bottom: 1rem; }
    }
  </style>
</head>

  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="https://img.konami.com/mg/s/img/bg_movie.mp4?v10" type="video/mp4">
    </video>
    <div class="hero-content">
      <h1>Kept you waiting, huh? <br>I am back!</h1>
      <h2>New website coming soon!</h2>
    </div>
  </section>

  <section class="products">
    <div class="grid" id="grid"></div>
  </section>

  <script>
    fetch('products.json')
      .then(r => r.json())
      .then(products => render(products))
      .catch(() => render([]));

    function render(products) {
      const grid = document.getElementById('grid');
      grid.innerHTML = products.map(productCard).join('');
    }

    function productCard(p) {
      return `
        <a class="card" href="${esc(p.url)}" target="_blank" rel="noopener">
          <div class="card-img">
            <img src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy">
          </div>
          <div class="card-body">
            <span class="card-tag">${esc(p.tag)}</span>
            <span class="card-title">${esc(p.title)}</span>
            <span class="card-btn">Koupit →</span>
          </div>
        </a>`;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>

  <!-- ── CHATBOT WIDGET ── -->
  <div class="chat-widget" id="chatWidget">
    <div class="chat-header">
      <div class="chat-avatar">🐍</div>
      <div class="chat-header-info">
        <div class="chat-header-name">Codec (Frequency 140.85)</div>
        <div class="chat-header-status">
          <span class="status-dot"></span>
          Online — připraven odpovídat
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <input class="chat-input" id="chatInput" type="text" placeholder="Napiš otázku…">
      <button class="chat-send" id="chatSend">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <button class="chat-toggle" id="chatToggle" aria-label="Otevřít chat">
    <svg class="icon-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
    <svg class="icon-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </button>

  <script src="js/snake-ai.js"></script>
  <script>
    document.querySelector('.chat-header-name').textContent = SnakeAI.CONFIG.botName;

    document.getElementById('chatToggle').addEventListener('click', () => {
      document.getElementById('chatWidget').classList.toggle('open');
    });

    SnakeAI.init({
      messagesEl: document.getElementById('chatMessages'),
      inputEl:    document.getElementById('chatInput'),
      sendEl:     document.getElementById('chatSend'),
    });
  </script>
