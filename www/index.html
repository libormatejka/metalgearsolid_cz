  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.25rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #ccc;
      transition: color 0.2s, background 0.2s;
    }

    .nav a:hover { color: #fff; background: rgba(255,255,255,0.08); }

    .nav svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 62vh;
      min-height: 400px;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* tmavý overlay přes video — zlehka ztmaví aby text byl čitelný */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    /* plynulý přechod do černé dole */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      background: linear-gradient(to bottom, transparent, #0d0d0d);
      z-index: 2;
    }

    .hero-content {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .hero-content h1 {
      font-size: clamp(1.8rem, 5vw, 3.6rem);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      letter-spacing: 0.02em;
      line-height: 1.15;
      max-width: 800px;
    }

    .hero-content h2 {
      margin-top: 1rem;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      font-weight: 400;
      color: #c9a84c;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── PRODUCTS ── */
    .products {
      background: #0d0d0d;
      padding: 1rem 1.5rem 5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #c9a84c;
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.15);
    }

    .card-img {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 220px;
      padding: 1rem;
    }

    .card-img img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
    }


    .card-body {
      padding: 1rem 1.2rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #4caf82;
      font-weight: 600;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e8e8e8;
      line-height: 1.4;
      flex: 1;
    }

    .card-btn {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.45rem 1rem;
      background: transparent;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      color: #c9a84c;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-align: center;
      transition: background 0.2s, color 0.2s;
    }

    .card:hover .card-btn {
      background: #c9a84c;
      color: #0d0d0d;
    }

@media (max-width: 700px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>

  <section class="hero">
    <video autoplay muted loop playsinline preload="auto">
      <source src="https://img.konami.com/mg/s/img/bg_movie.mp4?v10" type="video/mp4">
    </video>
    <div class="hero-content">
      <h1>Kept you waiting, huh? <br>I am back!</h1>

  <section class="products">
    <div class="grid" id="grid"></div>
  </section>

  <script>
    fetch('products.json')
      .then(r => r.json())
      .then(products => render(products))
      .catch(() => render([]));

    function render(products) {
      const grid = document.getElementById('grid');
      grid.innerHTML = products.map(productCard).join('');
    }

    function productCard(p) {
      return `
        <a class="card" href="${esc(p.url)}" target="_blank" rel="noopener">
          <div class="card-img">
            <img src="${esc(p.image)}" alt="${esc(p.title)}" loading="lazy">
          </div>
          <div class="card-body">
            <span class="card-tag">${esc(p.tag)}</span>
            <span class="card-title">${esc(p.title)}</span>
            <span class="card-btn">Koupit →</span>
          </div>
        </a>`;
    }

function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
